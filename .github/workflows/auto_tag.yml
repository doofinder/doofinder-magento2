name: Auto Tag on Version Change

on:
  push:
    branches:
      - master

jobs:
  auto-tag:
    name: Create Tag if Version Changed
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      tag_created: ${{ steps.tag_check.outputs.created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from module.xml
        id: version
        run: |
          version=$(grep -oP 'setup_version="\K[^"]+' Doofinder/Feed/etc/module.xml)
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "tag=v$version" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git tag -l "${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "created=false" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping."
          else
            echo "created=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.tag }} does not exist — It will be created."
          fi

      - name: Create and push tag
        if: steps.tag_check.outputs.created == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

  create-release:
    name: Trigger Release
    needs: auto-tag
    if: needs.auto-tag.outputs.tag_created == 'true'
    uses: ./.github/workflows/create_release.yml
    with:
      tag: ${{ needs.auto-tag.outputs.tag }}
    permissions:
      contents: write
